<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Open Graph / Sharing Metadata -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Open Doors Voting - ICT University" />
		<meta property="og:description" content="Cast your vote for the most innovative project at the ICT University Open Doors Tech Expo!" />
		<meta property="og:image" content="/Assets/logo.jpeg" />
		<meta property="og:site_name" content="Open Doors Voting" />

		<!-- Twitter Sharing Metadata -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Open Doors Voting - ICT University" />
		<meta name="twitter:description" content="Cast your vote for the most innovative project at the ICT University Open Doors Tech Expo!" />
		<meta name="twitter:image" content="/Assets/logo.jpeg" />

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
